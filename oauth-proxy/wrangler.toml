name = "portfolio-oauth-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Public, non-secret values. Fill these in for your deploy:
[vars]
# The OAuth App client id (public). Same value the editor uses to start the flow.
GITHUB_CLIENT_ID = "Ov23liWlyP2MLmoVBnKF"
# CORS + caller lock. The origin(s) the hosted editor is served from (no trailing slash).
# Comma-separated list: the canonical custom domain first, then the pages.dev fallback so
# both keep working. Keep the first entry in sync with `site` in astro.config.product.mjs.
ALLOWED_ORIGIN = "https://hangwork.art,https://portfolio-template-9p2.pages.dev"

# The domain new sites get their default address under ([name].hangwork.art), and the
# Cloudflare zone id for it (Cloudflare dashboard → hangwork.art → Overview → Zone ID).
SITES_ROOT_DOMAIN = "hangwork.art"
CF_ZONE_ID = "45dd2f188d13d5dace6eeeb7d74282e0"

# /handoff ("send me the link" + post-purchase email). The sender address — its domain
# must be verified in Resend (DNS records on hangwork.art). /handoff answers 503 until
# EMAIL_FROM and the RESEND_API_KEY secret are both set.
EMAIL_FROM = "Hangwork <hello@hangwork.art>"
# Lemon Squeezy store/product ids — /handoff only mails buyers of THIS product.
# Keep in sync with src/editor/lib/license/config.ts.
LS_STORE_ID = "431697"
LS_PRODUCT_ID = "1221404"

# SECRETS — do NOT put them here. Set them with:
#   wrangler secret put GITHUB_CLIENT_SECRET
#   wrangler secret put CF_DNS_TOKEN        (Cloudflare API token, DNS:Edit on the hangwork.art zone)
#   wrangler secret put RESEND_API_KEY      (Resend API key for /handoff emails)
